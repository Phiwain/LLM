model:
  vocab_size: 32000
  d_model: 1280
  d_ff: 5120
  n_layers: 28
  n_heads: 16
  n_experts: 16
  top_k: 2
  max_seq_len: 1024
  rope_theta: 10000.0
  norm_eps: 1.0e-6
  tie_embeddings: true
  use_flash_attention: true
  use_grad_checkpoint: true

training:
  batch_size: 16
  grad_accum_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.1
  warmup_steps: 500
  max_steps: 100000
  grad_clip: 1.0
  aux_loss_weight: 0.01
  checkpoint_interval: 1000
  eval_interval: 500
  log_interval: 10
  seed: 42
  use_bf16: true
  use_wandb: false
  use_8bit_optimizer: true

data:
  dataset: "code-first-multi-source"
  # ~65% code system, ~20% dev web (HTML/CSS/JS/PHP), ~5% distillation, ~10% base FR/EN
  sources:
    github_code: 12000000     # codeparrot/github-code (Python, JS, TS, Go, Rust, C, C++, Java, Shell, SQL)
    webdev_code: 3000000      # GitHub Code HTML/CSS/JS/PHP — concentrated web dev
    fable5_code: 603          # PawanKrd/claude-fable-5-code (Claude code+math)
    code_alpaca: 20000        # HuggingFaceH4/CodeAlpaca_20K (code instruction)
    mythos_distilled: 25000   # WithinUsAI/claude_mythos_distilled_25k (distillation)
    fable5_agent: 63          # armand0e/claude-fable-5-claude-code (agent traces)
    glm52_agent: 284          # AletheiaResearch/GLM-5.2-Agent (GLM agent traces)
    wikipedia_en: 500000      # base EN (~300M tokens)
    wikipedia_fr: 500000      # base FR (~250M tokens)
  languages: ["en", "fr", "code"]
  seq_len: 1024
  val_ratio: 0.01
  tokenizer_train_docs: 300000
