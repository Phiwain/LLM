model:
  vocab_size: 32000
  d_model: 768
  d_ff: 4096
  n_layers: 12
  n_heads: 12
  n_experts: 8
  top_k: 2
  max_seq_len: 1024
  rope_theta: 10000.0
  norm_eps: 1.0e-6
  tie_embeddings: true
  use_flash_attention: true
  use_grad_checkpoint: false

training:
  batch_size: 32
  grad_accum_steps: 2        # -> effective batch = 64 sequences
  learning_rate: 3.0e-4
  weight_decay: 0.1
  warmup_steps: 200
  max_steps: 50000
  grad_clip: 1.0
  aux_loss_weight: 0.01
  checkpoint_interval: 1000
  eval_interval: 500
  log_interval: 10
  seed: 42
  use_bf16: true
  use_wandb: false

data:
  dataset: "uonlp/CulturaX"
  languages: ["en", "fr"]
  n_docs_per_lang: 750000
  seq_len: 1024
  val_ratio: 0.01
  tokenizer_train_docs: 200000
